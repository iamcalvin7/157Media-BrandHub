kind = "web"
previewPath = "/"
title = "Virtu Ferries Brand Hub"
version = "1.0.0"
id = "artifacts/virtu-ferries-brand-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25751

[services.development]
run = "pnpm --filter @workspace/virtu-ferries-brand-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/virtu-ferries-brand-hub", "run", "build" ]
publicDir = "artifacts/virtu-ferries-brand-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25751"
BASE_PATH = "/"
